name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    # macos-26 ships Xcode 27 — required for the Swift 6 / SWIFT_DEFAULT_ACTOR_ISOLATION
    # build settings (Swift 6.2+). macos-14 is deprecated and its toolchain tops out at
    # Swift 5 ("SWIFT_VERSION '6.0' is unsupported").
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build (Debug, unsigned)
        run: |
          xcodebuild -project zMD.xcodeproj -scheme zMD -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Test (Debug, unsigned)
        run: |
          xcodebuild -project zMD.xcodeproj -scheme zMD -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            test -destination 'platform=macOS'
